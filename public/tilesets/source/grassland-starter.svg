<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <pattern id="grassDots" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#6fd55b"/>
      <rect x="1" y="1" width="2" height="2" fill="#7be46a"/>
      <rect x="5" y="3" width="2" height="2" fill="#54b64a"/>
      <rect x="3" y="6" width="2" height="2" fill="#4ea145"/>
    </pattern>
    <pattern id="pathDots" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#c89663"/>
      <rect x="1" y="1" width="2" height="2" fill="#d8aa78"/>
      <rect x="4" y="2" width="2" height="2" fill="#b07b4f"/>
      <rect x="2" y="5" width="2" height="2" fill="#a97147"/>
    </pattern>
    <pattern id="waterDots" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#39aaf0"/>
      <rect x="0" y="1" width="8" height="1" fill="#7dd8ff"/>
      <rect x="1" y="5" width="6" height="1" fill="#2488cf"/>
    </pattern>
    <pattern id="stoneDots" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#bfc6d6"/>
      <rect x="1" y="1" width="3" height="2" fill="#d8deea"/>
      <rect x="4" y="4" width="3" height="2" fill="#8f96a8"/>
      <rect x="2" y="6" width="2" height="1" fill="#7a8190"/>
    </pattern>
    <pattern id="woodDots" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#8e5c37"/>
      <rect x="0" y="2" width="8" height="1" fill="#6f4324"/>
      <rect x="0" y="5" width="8" height="1" fill="#a56e45"/>
    </pattern>
  </defs>

  <rect width="256" height="256" fill="#111"/>

  <g transform="translate(0 0)">
    <rect width="32" height="32" fill="url(#grassDots)"/>
    <path d="M4 28 L8 22 L11 28 M12 28 L16 20 L20 28 M19 28 L23 22 L27 28" fill="none" stroke="#2c7a2b" stroke-width="2"/>
  </g>

  <g transform="translate(32 0)">
    <rect width="32" height="32" fill="url(#pathDots)"/>
    <circle cx="10" cy="9" r="3" fill="#dcb282"/>
    <circle cx="20" cy="16" r="4" fill="#b67c4f"/>
    <circle cx="14" cy="24" r="3" fill="#e0b787"/>
  </g>

  <g transform="translate(64 0)">
    <rect width="32" height="32" fill="url(#waterDots)"/>
    <path d="M0 8 C6 6, 10 10, 16 8 S26 6, 32 8" fill="none" stroke="#d6f7ff" stroke-width="2"/>
    <path d="M0 20 C6 18, 10 22, 16 20 S26 18, 32 20" fill="none" stroke="#d6f7ff" stroke-width="2"/>
  </g>

  <g transform="translate(96 0)">
    <rect width="32" height="32" fill="url(#grassDots)"/>
    <circle cx="16" cy="13" r="10" fill="#2fa347"/>
    <circle cx="11" cy="14" r="7" fill="#39b552"/>
    <circle cx="21" cy="14" r="7" fill="#39b552"/>
    <rect x="13" y="20" width="6" height="8" fill="#8e5c37"/>
  </g>

  <g transform="translate(128 0)">
    <rect width="32" height="32" fill="url(#grassDots)"/>
    <path d="M6 22 L10 14 L14 22 Z" fill="#35a84c"/>
    <path d="M10 18 L16 8 L22 18 Z" fill="#2f9445"/>
    <path d="M14 24 L20 14 L26 24 Z" fill="#36ad4f"/>
    <rect x="14" y="22" width="4" height="6" fill="#8e5c37"/>
  </g>

  <g transform="translate(160 0)">
    <rect width="32" height="32" fill="url(#grassDots)"/>
    <ellipse cx="16" cy="18" rx="10" ry="7" fill="#aeb6c7"/>
    <ellipse cx="13" cy="16" rx="5" ry="4" fill="#dbe1ea"/>
    <ellipse cx="20" cy="20" rx="4" ry="3" fill="#7e8696"/>
  </g>

  <g transform="translate(192 0)">
    <rect width="32" height="32" fill="url(#pathDots)"/>
    <rect x="4" y="4" width="24" height="24" fill="#4b6da8" stroke="#e6eefc" stroke-width="2"/>
    <rect x="10" y="10" width="12" height="12" fill="#7ea6ee"/>
  </g>

  <g transform="translate(224 0)">
    <rect width="32" height="32" fill="url(#woodDots)"/>
    <rect x="3" y="3" width="26" height="26" fill="#efdcae" stroke="#8b6d43" stroke-width="2"/>
    <rect x="9" y="9" width="14" height="14" fill="#31558e"/>
  </g>

  <g transform="translate(0 32)">
    <rect width="32" height="32" fill="url(#grassDots)"/>
    <rect x="0" y="18" width="32" height="14" fill="url(#pathDots)"/>
  </g>

  <g transform="translate(32 32)">
    <rect width="32" height="32" fill="url(#grassDots)"/>
    <rect x="9" y="0" width="14" height="32" fill="url(#pathDots)"/>
  </g>

  <g transform="translate(64 32)">
    <rect width="32" height="32" fill="url(#grassDots)"/>
    <rect x="0" y="18" width="32" height="14" fill="url(#pathDots)"/>
    <rect x="9" y="0" width="14" height="32" fill="url(#pathDots)"/>
  </g>

  <g transform="translate(96 32)">
    <rect width="32" height="32" fill="url(#waterDots)"/>
    <rect x="0" y="0" width="32" height="6" fill="#8f5d3a"/>
    <rect x="0" y="6" width="32" height="3" fill="#d3a673"/>
  </g>

  <g transform="translate(128 32)">
    <rect width="32" height="32" fill="url(#waterDots)"/>
    <rect x="0" y="26" width="32" height="6" fill="#8f5d3a"/>
    <rect x="0" y="23" width="32" height="3" fill="#d3a673"/>
  </g>

  <g transform="translate(160 32)">
    <rect width="32" height="32" fill="url(#waterDots)"/>
    <rect x="0" y="0" width="6" height="32" fill="#8f5d3a"/>
    <rect x="6" y="0" width="3" height="32" fill="#d3a673"/>
  </g>

  <g transform="translate(192 32)">
    <rect width="32" height="32" fill="url(#waterDots)"/>
    <rect x="26" y="0" width="6" height="32" fill="#8f5d3a"/>
    <rect x="23" y="0" width="3" height="32" fill="#d3a673"/>
  </g>

  <g transform="translate(224 32)">
    <rect width="32" height="32" fill="url(#pathDots)"/>
    <rect x="0" y="0" width="32" height="32" fill="none" stroke="#8e6266" stroke-width="4"/>
    <rect x="7" y="7" width="18" height="18" fill="#efdcae"/>
  </g>
</svg>
